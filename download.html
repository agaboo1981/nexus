<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Download the App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#050810] text-white flex items-center justify-center min-h-screen p-6">
    <div class="absolute inset-0 z-0 opacity-20 overflow-hidden pointer-events-none">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#5bc0be]/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 w-full max-w-2xl text-center">
        <a href="index.html" class="inline-flex items-center gap-2 group mb-12">
            <div class="w-10 h-10 bg-[#5bc0be] rounded-xl flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                <i data-lucide="shield-check" class="w-6 h-6 text-[#050810]"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter text-white">NEXUS<span class="text-[#5bc0be]">.</span></h1>
        </a>

        <div class="bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-12 md:p-16 shadow-2xl">
            <div class="w-20 h-20 bg-[#5bc0be]/10 rounded-3xl flex items-center justify-center text-[#5bc0be] mx-auto mb-8">
                <i data-lucide="smartphone" class="w-10 h-10"></i>
            </div>
            <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-6 leading-tight">Banking is better <br/><span class="text-[#5bc0be]">on mobile.</span></h2>
            <p class="text-gray-400 text-lg mb-12 max-w-md mx-auto leading-relaxed">
                For security and the best experience, all banking actions happen within the Nexus mobile app.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="#" class="bg-white text-black px-8 py-4 rounded-2xl flex items-center gap-4 hover:bg-[#5bc0be] transition-all group">
                    <i class="fa-brands fa-apple text-[1.5rem] leading-none"></i>
                    <div class="text-left leading-tight">
                        <span class="text-[10px] block uppercase font-bold opacity-60">Download on</span>
                        <span class="font-bold text-lg">App Store</span>
                    </div>
                </a>
                <a href="#" class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-2xl flex items-center gap-4 hover:bg-white/10 transition-all group">
                    <i class="fa-brands fa-google-play text-[1.35rem] leading-none text-[#5bc0be]"></i>
                    <div class="text-left leading-tight">
                        <span class="text-[10px] block uppercase font-bold opacity-60">Get it on</span>
                        <span class="font-bold text-lg">Google Play</span>
                    </div>
                </a>
            </div>

            <div class="mt-12 flex items-center justify-center gap-2 text-gray-500 text-sm">
                <i data-lucide="qr-code" class="w-4 h-4"></i>
                <span>Or scan the QR code on your desktop</span>
            </div>
        </div>
        
        <a href="index.html" class="inline-block mt-12 text-gray-500 hover:text-white transition-colors text-sm font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4 inline mr-2"></i> Back to Homepage
        </a>
    </div>
    <script type="module" src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
