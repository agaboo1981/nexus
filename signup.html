<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(40px);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
    </head>
    <body class="bg-[#050810] text-white flex items-center justify-center min-h-screen p-6 overflow-hidden">

    <div class="absolute inset-0 z-0 opacity-20 overflow-hidden pointer-events-none">        <div class="absolute bottom-10 right-10 w-[800px] h-[800px] bg-[#5bc0be]/10 rounded-full blur-[120px]"></div>
        <svg class="h-full w-full stroke-white/5" fill="none">
            <defs>
                <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path d="M0 60V.5H60" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>
    </div>

    <div class="relative z-10 w-full max-w-md animate-on-scroll fade-in">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 group mb-8">
                <div class="w-10 h-10 bg-[#5bc0be] rounded-xl flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                    <i data-lucide="shield-check" class="w-6 h-6 text-[#050810]"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter text-white">NEXUS<span class="text-[#5bc0be]">.</span></h1>
            </a>
            <h2 class="text-3xl font-bold tracking-tight">Open your vault</h2>
            <p class="text-gray-500 mt-2">Join the next generation of global finance.</p>
        </div>

        <div class="auth-card p-10 rounded-[2.5rem] shadow-2xl">
            <form action="#" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="firstName" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">First Name</label>
                        <input id="firstName" type="text" placeholder="John" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                    <div>
                        <label for="lastName" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Last Name</label>
                        <input id="lastName" type="text" placeholder="Doe" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                        <input id="email" type="email" placeholder="john@company.com" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Create Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                        <input id="password" type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                    <div class="mt-2 flex gap-1 px-1">
                        <div class="h-1 flex-1 bg-[#5bc0be]/20 rounded-full"></div>
                        <div class="h-1 flex-1 bg-white/10 rounded-full"></div>
                        <div class="h-1 flex-1 bg-white/10 rounded-full"></div>
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1 py-2">
                    <input id="terms" type="checkbox" class="mt-1 accent-[#5bc0be]">
                    <label for="terms" class="text-[10px] text-gray-500 leading-normal">I agree to the <a href="#" class="text-white font-bold hover:text-[#5bc0be]">Terms of Service</a> and <a href="#" class="text-white font-bold hover:text-[#5bc0be]">Privacy Policy</a>.</label>
                </div>

                <button type="submit" class="w-full bg-white text-[#050810] py-4 rounded-2xl font-bold text-sm hover:bg-[#5bc0be] transition-all duration-300 active:scale-[0.98]">
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-sm text-gray-500">Already a member? <a href="login.html" class="text-white font-bold hover:text-[#5bc0be] transition-colors">Log in</a></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
