<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(40px);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
    </head>
    <body class="bg-[#050810] text-white flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <nav class="fixed top-0 w-full z-50 transition-all duration-500 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-2 group cursor-pointer">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#5bc0be] rounded-lg flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                        <i data-lucide="shield-check" class="w-5 h-5 text-[#050810]"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tighter text-white">NEXUS<span class="text-[#5bc0be]">.</span></h1>
                </a>
            </div>
            
            <div class="hidden md:flex items-center space-x-10 text-[13px] font-medium text-gray-400">
                <a href="about.html" class="hover:text-white transition-colors duration-300">About Us</a>
                <a href="pricing.html" class="hover:text-white transition-colors duration-300">Pricing</a>
                <a href="index.html#features" class="hover:text-white transition-colors duration-300">Features</a>
            </div>

            <div class="flex items-center space-x-3 md:space-x-6">
                <a href="login.html" class="text-[13px] font-semibold text-gray-300 hover:text-white transition cursor-pointer">Log in</a>
                <a href="signup.html" class="hidden sm:block bg-[#5bc0be] text-[#050810] px-6 py-2.5 rounded-full text-[13px] font-bold hover:bg-white transition-all duration-300 shadow-lg shadow-white/5 cursor-pointer">Open Account</a>
                <button id="mobile-menu-toggle" class="md:hidden text-white p-2 focus:outline-none" aria-label="Open mobile menu" title="Open mobile menu">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#050810]/95 backdrop-blur-2xl flex flex-col items-center justify-center gap-10 opacity-0 pointer-events-none transition-all duration-500 overflow-hidden">
        <button id="mobile-menu-close" class="absolute top-8 right-8 text-gray-400 hover:text-white" aria-label="Close mobile menu" title="Close mobile menu">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <div class="flex flex-col items-center gap-8 text-2xl font-bold tracking-tighter">
            <a href="index.html" class="mobile-link text-white hover:text-[#5bc0be]">Home</a>
            <a href="about.html" class="mobile-link text-white hover:text-[#5bc0be]">About Us</a>
            <a href="pricing.html" class="mobile-link text-white hover:text-[#5bc0be]">Pricing</a>
            <a href="index.html#features" class="mobile-link text-white hover:text-[#5bc0be]">Features</a>
        </div>
        <div class="flex flex-col gap-4 w-full px-12 mt-4">
            <a href="signup.html" class="w-full bg-white text-[#050810] py-5 rounded-2xl text-center font-black">Open Free Account</a>
            <a href="login.html" class="w-full bg-white/5 border border-white/10 text-white py-5 rounded-2xl text-center font-black">Login</a>
        </div>
    </div>

    <div class="absolute inset-0 z-0 opacity-20 overflow-hidden pointer-events-none">        <div class="absolute bottom-10 right-10 w-[800px] h-[800px] bg-[#5bc0be]/10 rounded-full blur-[120px]"></div>
        <svg class="h-full w-full stroke-white/5" fill="none">
            <defs>
                <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path d="M0 60V.5H60" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>
    </div>

    <div class="relative z-10 w-full max-w-md animate-on-scroll fade-in">
        <div class="text-center mb-10">
            <a href="index.html" class="inline-flex items-center gap-2 group mb-8">
                <div class="w-10 h-10 bg-[#5bc0be] rounded-xl flex items-center justify-center transform group-hover:rotate-12 transition-transform duration-300">
                    <i data-lucide="shield-check" class="w-6 h-6 text-[#050810]"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter text-white">NEXUS<span class="text-[#5bc0be]">.</span></h1>
            </a>
            <h2 class="text-3xl font-bold tracking-tight">Open your vault</h2>
            <p class="text-gray-500 mt-2">Join the next generation of global finance.</p>
        </div>

        <div class="auth-card p-10 rounded-[2.5rem] shadow-2xl">
            <form action="#" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="firstName" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">First Name</label>
                        <input id="firstName" type="text" placeholder="John" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                    <div>
                        <label for="lastName" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Last Name</label>
                        <input id="lastName" type="text" placeholder="Doe" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                        <input id="email" type="email" placeholder="john@company.com" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 mb-2 ml-1">Create Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600"></i>
                        <input id="password" type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-[#5bc0be] transition-colors">
                    </div>
                    <div class="mt-2 flex gap-1 px-1">
                        <div class="h-1 flex-1 bg-[#5bc0be]/20 rounded-full"></div>
                        <div class="h-1 flex-1 bg-white/10 rounded-full"></div>
                        <div class="h-1 flex-1 bg-white/10 rounded-full"></div>
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1 py-2">
                    <input id="terms" type="checkbox" class="mt-1 accent-[#5bc0be]">
                    <label for="terms" class="text-[10px] text-gray-500 leading-normal">I agree to the <a href="#" class="text-white font-bold hover:text-[#5bc0be]">Terms of Service</a> and <a href="#" class="text-white font-bold hover:text-[#5bc0be]">Privacy Policy</a>.</label>
                </div>

                <button type="submit" class="w-full bg-white text-[#050810] py-4 rounded-2xl font-bold text-sm hover:bg-[#5bc0be] transition-all duration-300 active:scale-[0.98]">
                    Create Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 text-center">
                <p class="text-sm text-gray-500">Already a member? <a href="login.html" class="text-white font-bold hover:text-[#5bc0be] transition-colors">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
